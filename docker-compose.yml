version: '3.9'
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ratoservices
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    image: node:22
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    env_file:
      - .env
    volumes:
      - ./:/app
    depends_on:
      - postgres

volumes:
  postgres_data:
